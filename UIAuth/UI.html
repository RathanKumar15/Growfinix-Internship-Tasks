<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Authentication UI</title>

<link rel="stylesheet" href="UI.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

<div class="auth-card">

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="registerTab">Register</button>
</div>

<!-- LOGIN FORM -->
<form id="loginForm">

<h2>Welcome Back</h2>

<div class="input-group">
<input type="email" id="loginEmail" placeholder="Email Address">
<small class="error"></small>
</div>

<div class="input-group">
<input type="password" id="loginPassword" placeholder="Password">
<i class="fa-solid fa-eye toggle-password"></i>
<small class="error"></small>
</div>

<div class="options">
<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit" class="btn">
<span class="btn-text">Login</span>
<span class="loader hidden"></span>
</button>

<div class="divider">OR</div>

<div class="social-login">
<button type="button"><i class="fab fa-google"></i></button>
<button type="button"><i class="fab fa-github"></i></button>
<button type="button"><i class="fab fa-facebook"></i></button>
<button type="button"><i class="fab fa-linkedin"></i></button>
</div>

</form>

<!-- REGISTER FORM -->
<form id="registerForm" class="hidden">

<h2>Create Account</h2>

<div class="input-group">
<input type="text" id="fullName" placeholder="Full Name">
<small class="error"></small>
</div>

<div class="input-group">
<input type="email" id="registerEmail" placeholder="Email Address">
<small class="error"></small>
</div>

<div class="input-group">
<input type="password" id="registerPassword" placeholder="Password">
<i class="fa-solid fa-eye toggle-password"></i>
<small class="error"></small>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<i class="fa-solid fa-eye toggle-password"></i>
<small class="error"></small>
</div>

<div class="terms">
<label>
<input type="checkbox" id="terms">
Accept Terms & Conditions
</label>
</div>

<button type="submit" class="btn">
Register
</button>

<div class="divider">OR</div>

<div class="social-login">
<a href="www.google.com"><button type="button"><i class="fab fa-google"></i></button></a>
<button type="button"><i class="fab fa-github"></i></button>
<button type="button"><i class="fab fa-facebook"></i></button>
<button type="button"><i class="fab fa-linkedin"></i></button>
</div>

</form>

<div id="message"></div>

</div>
</div>

<script src="UI.js"></script>
</body>
</html>
